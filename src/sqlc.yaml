version: "2"
sql:
  - engine: postgresql
    schema:
      - internal/infra/db/schema
    queries:
      - internal/infra/db/queries
    gen:
      go:
        package: sqlc_generated
        out: internal/infra/db/sqlc_generated
        sql_package: pgx/v5
        # emit_json_tags: true
        emit_pointers_for_null_types: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"
