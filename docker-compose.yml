secrets:
  db_password:
    file: ${DB_PASSWORD_FILE}
  jwt_secret:
    file: ${JWT_SECRET_FILE}

services:
  db:
    image: postgres:16-alpine
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      # чтобы не зависеть от подстановки переменных на хосте — берем env внутри контейнера
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      # ВАЖНО: внутри контейнера postgres слушает 5432
      - "${DB_PORT:-5432}:5432"

  migrator:
    image: migrate/migrate:latest
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
    env_file:
      - .env
    # 3. Монтируем наш скрипт как точку входа (entrypoint)
    volumes:
      - ${MIGR_DIR}:/migrations:ro
      - ./entrypoint.sh:/entrypoint.sh:ro # <-- Монтируем скрипт
    entrypoint: ["/bin/sh", "/entrypoint.sh"] # <-- Запускаем скрипт
    restart: "on-failure"

  bff:
    image: ghcr.io/aldz231188/be2-bff:latest 
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        APP_CMD: ./cmd/server
    restart: ${APP_RESTART_POLICY:-"no"}
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
      auth:
        condition: service_started
    secrets:
      - db_password
      - jwt_secret
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    expose:
      - "${HTTP_PORT}"

  auth:
    image: ghcr.io/aldz231188/be2-auth:latest 
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        APP_CMD: ./cmd/authserver
    restart: ${AUTH_RESTART_POLICY:-"no"}
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password
      - jwt_secret
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    expose:
      - "${AUTH_GRPC_PORT:-9090}"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_gateway
    depends_on:
      - bff
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - NGINX_HOST=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
