version: "3.9"

secrets:
  db_password:
    file: ./secrets/db_password.txt

services:
  db:
    image: postgres:16-alpine
    secrets:
      - db_password
    environment:
      POSTGRES_USER: app
      POSTGRES_DB: appdb
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    # expose:
    #   - "5432"
    ports: ["5432:5432"]
# все еще светятся секреты
  migrator:
    image: migrate/migrate:latest
    depends_on:
      db:
        condition: service_healthy
    command: [
      "-path", "/migrations",
      "-database", "postgres://app:qwe@db:5432/appdb?sslmode=disable",
      "up"
    ]
    volumes:
      - ./internal/infra/db/migrations:/migrations:ro
    restart: "on-failure"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
    secrets:
      - db_password
    environment:
      HTTP_ADDR: :8080
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: app
      DB_NAME: appdb
      SSLMODE: disable
      DB_PASSWORD_FILE: /run/secrets/db_password
    expose:
      - "8080"
    # ports: ["8080:8080"]
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_gateway
    depends_on:
      - app
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./static:/var/www/static:ro     # если есть статика
    ports:
      - "80:80"        # наружу торчит только Nginx
    # networks можно оставить по умолчанию (default)