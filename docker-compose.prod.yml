secrets:
  db_password:
    file: ${DB_PASSWORD_FILE}
  jwt_secret:
    file: ${JWT_SECRET_FILE}
  jwt_private_key:
    file: ${JWT_PRIVATE_KEY_FILE}

services:
  clientsvc_db:
    image: postgres:16-alpine
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432"

  authsvc_db:
    image: postgres:16-alpine
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5434:5432"

  clientsvc_migrator:
    image: migrate/migrate:latest
    depends_on:
      clientsvc_db:
        condition: service_healthy
    secrets:
      - db_password
    env_file:
      - .env
    environment:
      DB_HOST: clientsvc_db
    volumes:
      - ${CLIENT_MIGR_DIR}:/migrations:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: "on-failure"

  authsvc_migrator:
    image: migrate/migrate:latest
    depends_on:
      authsvc_db:
        condition: service_healthy
    secrets:
      - db_password
    env_file:
      - .env
    environment:
      DB_HOST: authsvc_db
    volumes:
      - ${AUTH_MIGR_DIR}:/migrations:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: "on-failure"

  app:
    image: ghcr.io/${GHCR_REPO}/app:${IMAGE_TAG:-latest}
    restart: ${APP_RESTART_POLICY:-"no"}
    env_file:
      - .env
    depends_on:
      clientsvc:
        condition: service_started
      authsvc:
        condition: service_started
    secrets:
      - db_password
      - jwt_secret
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    expose:
      - "${HTTP_PORT}"

  clientsvc:
    image: ghcr.io/${GHCR_REPO}/clientsvc:${IMAGE_TAG:-latest}
    restart: ${APP_RESTART_POLICY:-"no"}
    env_file:
      - .env
    depends_on:
      clientsvc_migrator:
        condition: service_completed_successfully
    secrets:
      - db_password
      - jwt_secret
    environment:
      DB_HOST: clientsvc_db
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret

  authsvc:
    image: ghcr.io/${GHCR_REPO}/authsvc:${IMAGE_TAG:-latest}
    restart: ${APP_RESTART_POLICY:-"no"}
    env_file:
      - .env
    depends_on:
      authsvc_migrator:
        condition: service_completed_successfully
    secrets:
      - db_password
      - jwt_private_key
    environment:
      DB_HOST: authsvc_db
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_gateway
    depends_on:
      - app
      - clientsvc
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - NGINX_HOST=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
