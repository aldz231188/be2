syntax = "proto3";

package auth.v1;

option go_package = "be2/contracts/authpb;authpb";


service AuthService {
  rpc Authenticate(AuthenticateRequest) returns (TokenPairResponse);
  rpc Register(RegisterRequest) returns (TokenPairResponse);
  rpc Refresh(RefreshRequest) returns (TokenPairResponse);
  rpc LogoutCurrent(LogoutRequest) returns (LogoutResponse);
  rpc LogoutAll(LogoutRequest) returns (LogoutResponse);
  rpc ValidateAccessToken(ValidateAccessTokenRequest) returns (ValidateAccessTokenResponse);
}

message AuthenticateRequest {
  string username = 1;
  string password = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message ValidateAccessTokenRequest {
  string access_token = 1;
}

message TokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutResponse {
  string status = 1;
}

message TokenClaims {
  string token_type = 1;
  int32 token_version = 2;
  string session_id = 3;
  string subject = 4;
  string id = 5;
  int64 expires_at_unix = 6;
  int64 issued_at_unix = 7;
}

message ValidateAccessTokenResponse {
  TokenClaims claims = 1;
}
