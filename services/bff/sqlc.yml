version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations/*.up.sql
    queries:
      - internal/infra/db/queries
    database:
      uri: ${DB_URI}
    rules:
      - sqlc/db-prepare
      - no-delete

    gen:
      go:
        package: sqlc_generated
        out: internal/infra/db/sqlc_generated
        sql_package: pgx/v5
        emit_pointers_for_null_types: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"

rules:
  - name: no-delete
    message: "Не используем SELECT *"
    rule: |
      query.sql.contains("SELECT *")
