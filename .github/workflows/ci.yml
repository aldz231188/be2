name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.24.0'
  SQLC_VERSION: 'v1.29.0'
  MIGRATE_VERSION: 'v4.18.3'

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install tools
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@${MIGRATE_VERSION}
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@${SQLC_VERSION}

      - name: Prepare databases
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -U postgres && break
            sleep 1
          done

          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE DATABASE clientsvcdb;
          CREATE DATABASE authsvcdb;
          SQL

      - name: Run migrations
        run: |
          migrate -path ./services/clientsvc/infra/db/migrations \
            -database "postgres://postgres:postgres@localhost:5432/clientsvcdb?sslmode=disable" up

          migrate -path ./services/authsvc/internal/infra/db/migrations \
            -database "postgres://postgres:postgres@localhost:5432/authsvcdb?sslmode=disable" up

      - name: Validate sqlc
        run: |
          (
            cd services/clientsvc
            DB_URI="postgres://postgres:postgres@localhost:5432/clientsvcdb?sslmode=disable" sqlc vet
            DB_URI="postgres://postgres:postgres@localhost:5432/clientsvcdb?sslmode=disable" sqlc generate
          )

          (
            cd services/authsvc
            DB_URI="postgres://postgres:postgres@localhost:5432/authsvcdb?sslmode=disable" sqlc vet
            DB_URI="postgres://postgres:postgres@localhost:5432/authsvcdb?sslmode=disable" sqlc generate
          )

      - name: Run tests
        run: |
          (cd contracts && go test ./...)
          (cd internal && go test ./...)
          (cd services/clientsvc && go test ./...)
          (cd services/authsvc && go test ./...)

  build-and-push:
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - image: app
          dockerfile: ./internal/Dockerfile
        - image: authsvc
          dockerfile: ./services/authsvc/Dockerfile
        - image: clientsvc
          dockerfile: ./services/clientsvc/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            cd workdir/be2
            git pull
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            make up-prod
            docker logout ghcr.io
            docker image prune -f
