name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Имя образа в реестре GitHub (автоматически подставит твой ник и репо)
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =======================================================
  # 1. ТЕСТЫ И ЛИНТЕРЫ
  # =======================================================
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Сначала ждем БД, потом накатываем миграции
      - name: Wait for DB
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U postgres && break
            sleep 1
          done

      - name: Install migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run DB migrations
        env:
          DB_URI: postgres://postgres:postgres@localhost:5432/appdb?sslmode=disable
        run: migrate -path ./internal/infra/db/migrations -database "$DB_URI" up

      - name: Install sqlc & Generate
        env:
          DB_URI: postgres://postgres:postgres@localhost:5432/appdb?sslmode=disable
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc generate

      - name: Test
        run: go test -v ./...

  # =======================================================
  # 2. СБОРКА ОБРАЗА И ОТПРАВКА В РЕЕСТР (ТОЛЬКО ДЛЯ MAIN)
  # =======================================================
  build-and-push:
    needs: tests # Ждем, пока пройдут тесты
    if: github.ref == 'refs/heads/main' # Запускаем только при пуше в main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Разрешаем писать в GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Важно: указываем target из Dockerfile, если у тебя multi-stage (например, prod)
          target: prod 

  # =======================================================
  # 3. ДЕПЛОЙ НА СЕРВЕР
  # =======================================================
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Заходим в папку проекта
            cd be2
            
            # 1. Обновляем код (чтобы подтянуть новый docker-compose.prod.yml если менялся)
            git pull origin main
            
            # 2. Логинимся в реестр GitHub (чтобы скачать приватный образ)
            # Используем GITHUB_TOKEN, но внутри Runner'а он недоступен напрямую в script,
            # поэтому здесь просто скачиваем, предполагая, что пакет публичный.
            # ЕСЛИ ПАКЕТ ПРИВАТНЫЙ: нужно создать PAT (Personal Access Token) и добавить его в secrets сервера.
            # Для простоты пока считаем, что image скачается.
            
            # 3. Скачиваем свежий образ
            docker compose -f docker-compose.prod.yml pull app
            
            # 4. Перезапускаем контейнеры
            docker compose -f docker-compose.prod.yml up -d
            
            # 5. Чистим старые образы, чтобы не забить диск
            docker image prune -f